<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gym Tracker</title>
    <link rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='52' font-size='54'%3E🏋%E2%80%8D%E2%99%80%EF%B8%8F%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <header class="app-header">
      <div class="header-content">
        <div>
          <p class="eyebrow">Treino Atual</p>
          <h1 id="active-workout-name">🏋🏽‍♀️ Gym Tracker</h1>
        </div>
        <div class="header-actions">
          <a class="header-link" href="old-workouts.html">Antigos</a>
          <button id="theme-toggle" class="theme-toggle" type="button"
            aria-label="Alternar tema" title="Alternar tema"></button>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <section class="current-section" aria-labelledby="active-workout-name">
        <nav id="day-tabs" class="day-tabs" aria-label="Dias do treino"></nav>
        <div id="current-day" class="workout-day"></div>
      </section>

      <section class="backup-section" aria-labelledby="backup-title">
        <h2 id="backup-title">Backup JSON</h2>
        <div class="backup-actions">
          <button id="export-backup" class="backup-button"
            type="button">Exportar</button>
          <button id="export-current-old" class="backup-button"
            type="button">Exportar atual como antigo</button>
          <button id="import-backup" class="backup-button"
            type="button">Importar</button>
        </div>
        <textarea id="backup-json" class="backup-textarea" rows="10"
          spellcheck="false" placeholder="JSON do backup"></textarea>
        <p id="backup-status" class="backup-status" aria-live="polite"></p>
      </section>

    </main>

    <script src="data/exerciseCatalog.js"></script>
    <script src="data/currentWorkout.js"></script>
    <script src="data/oldWorkouts.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/workouts.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/backup.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
